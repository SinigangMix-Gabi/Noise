<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brown Noise Focus Station</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <main class="app-container">

        <!-- Visualizer Canvas -->
        <section class="visualizer-wrapper" aria-label="Audio Visualizer">
            <canvas id="visualizer-canvas"></canvas>
            <div class="station-label">
                <span class="label-title">Focus Station</span>
                <span class="label-status" id="status-text">Paused</span>
            </div>
        </section>

        <!-- Control Bar -->
        <footer class="control-bar" role="region" aria-label="Playback Controls">

            <!-- Play / Pause Button -->
            <button class="play-btn" id="play-btn" aria-label="Play" aria-pressed="false">
                <svg class="icon icon-play" id="icon-play" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                    fill="currentColor" aria-hidden="true">
                    <path d="M8 5.14v14l11-7-11-7z" />
                </svg>
                <svg class="icon icon-pause" id="icon-pause" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                    fill="currentColor" aria-hidden="true" style="display:none;">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                </svg>
            </button>

            <!-- Volume Control -->
            <div class="slider-group">
                <label class="slider-label" for="volume-slider">
                    <svg class="slider-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
                        aria-hidden="true">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z" />
                    </svg>
                    Volume
                </label>
                <input type="range" id="volume-slider" class="slider" min="0" max="1" step="0.01" value="0.6"
                    aria-label="Volume" />
            </div>

            <!-- Color / Filter Control -->
            <div class="slider-group">
                <label class="slider-label" for="color-slider">
                    <svg class="slider-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
                        aria-hidden="true">
                        <path d="M12 3a9 9 0 1 0 0 18A9 9 0 0 0 12 3zm0 2a7 7 0 0 1 0 14V5z" />
                    </svg>
                    Color
                </label>
                <input type="range" id="color-slider" class="slider color-slider" min="100" max="3500" step="10"
                    value="400" aria-label="Noise Color (Low Pass Filter Frequency)" />
            </div>

        </footer>

    </main>

    <script src="audio-engine.js" type="module"></script>
    <script src="app.js" type="module"></script>

</body>

</html>
